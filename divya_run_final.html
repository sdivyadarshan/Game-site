<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Divya Run</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1628;overflow:hidden;font-family:'Segoe UI',sans-serif}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#panel{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 22px}
#score{font-size:30px;font-weight:800;color:#fff;text-shadow:0 0 18px rgba(79,195,247,.8)}
#best{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px}
#coindisp{font-size:18px;color:#ffd700;font-weight:700;margin-top:6px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,15,35,.85)}
#overlay h1{font-size:48px;font-weight:900;color:#fff;letter-spacing:4px;text-shadow:0 0 50px rgba(79,195,247,1);margin-bottom:4px}
.sub{color:rgba(255,255,255,.55);font-size:15px;margin-bottom:32px}
#final{color:#ffd700;font-size:22px;font-weight:700;margin-bottom:16px;display:none}
#btn{background:linear-gradient(135deg,#4fc3f7,#0277bd);color:#fff;border:none;padding:14px 56px;border-radius:50px;font-size:21px;font-weight:800;cursor:pointer;letter-spacing:1px;box-shadow:0 8px 30px rgba(79,195,247,.5);transition:transform .12s}
#btn:hover{transform:scale(1.07)}
#btn:active{transform:scale(.96)}
#hint{margin-top:16px;font-size:12px;color:rgba(255,255,255,.3)}
#jumpbtn{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.25);color:#fff;font-size:34px;display:none;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none}
</style>
</head>

const FW = 153, FH = 204, FDUR = 80;
const FOOT_RATIO = 0.9068627450980392;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const coinEl = document.getElementById('coindisp');
const finalEl = document.getElementById('final');
const btn = document.getElementById('btn');
const jumpBtn = document.getElementById('jumpbtn');

let W, H, groundY;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = Math.min(window.innerHeight, 500);
  groundY = H - 75;
}
resize();
window.addEventListener('resize', resize);

// Audio setup using Web Audio API for low-latency replay
let audioCtx = null;
let coinAudioBuffer = null;
let deathAudioBuffer = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Decode the mp3
  const raw = atob(COIN_SND_B64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  audioCtx.decodeAudioData(arr.buffer).then(buf => {
    coinAudioBuffer = buf;
  }).catch(e => console.warn('Audio decode failed:', e));
  // Decode death sound
  const rawDeath = atob(DEATH_SND_B64);
  const arrDeath = new Uint8Array(rawDeath.length);
  for (let i = 0; i < rawDeath.length; i++) arrDeath[i] = rawDeath.charCodeAt(i);
  audioCtx.decodeAudioData(arrDeath.buffer).then(buf => {
    deathAudioBuffer = buf;
  }).catch(e => console.warn('Death audio decode failed:', e));
}

function playCoinSound() {
  if (!audioCtx || !coinAudioBuffer) return;
  const src = audioCtx.createBufferSource();
  src.buffer = coinAudioBuffer;
  src.connect(audioCtx.destination);
  src.start(0);
}

function playDeathSound() {
  if (!audioCtx || !deathAudioBuffer) return;
  const src = audioCtx.createBufferSource();
  src.buffer = deathAudioBuffer;
  src.connect(audioCtx.destination);
  src.start(0);
}

const imgs = FRAMES.map(b64 => {
  const img = new Image();
  img.src = 'data:image/png;base64,' + b64;
  return img;
});

const SCALE = 0.72;
const CW = FW * SCALE;
const CH = FH * SCALE;
const FOOT_H = CH * FOOT_RATIO;

const TOP_PAD = (18/204) * CH;
const BOT_PAD = (19/204) * CH;
const LEFT_PAD = (29/153) * CW;
const RIGHT_PAD = ((153-123)/153) * CW;

const GROUND_Y_POS = () => groundY - FOOT_H;

const P = { x:80, y:0, vy:0, jumps:2, fi:0, ft:0, inv:0 };
function resetP() {
  P.y = GROUND_Y_POS();
  P.vy = 0; P.jumps = 2; P.fi = 0; P.ft = 0; P.inv = 0;
}

const stars = Array.from({length:60}, () => ({
  x: Math.random()*3000, y: Math.random()*200, r: Math.random()*1.5+0.3
}));
const buildings = Array.from({length:14}, (_, i) => ({
  x: i*(window.innerWidth/5)+Math.random()*80,
  w: 45+Math.random()*65, h: 60+Math.random()*160,
  shade: Math.floor(Math.random()*4)
}));
const bgShades = ['#111e36','#16253e','#0e1a30','#131f38'];
let bgX = 0;

let state = 'idle', score = 0, best = 0, coins = 0, spd = 0, gf = 0;
let obstacles = [], coinObjs = [], particles = [];
let lastObs = 0, lastCoin = 0;

function jump() {
  if (state !== 'run') return;
  if (P.jumps > 0) {
    P.vy = P.jumps === 2 ? -16 : -12;
    P.jumps--;
    burst(P.x + CW/2, P.y + FOOT_H, '#4fc3f7', 7);
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); if (state !== 'run') go(); }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); if (state !== 'run') go(); }, {passive:false});
btn.addEventListener('click', go);
jumpBtn.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});
if ('ontouchstart' in window) jumpBtn.style.display = 'flex';

function go() {
  initAudio(); // Must init on user gesture
  state = 'run'; score = 0; coins = 0; spd = 5; gf = 0;
  obstacles = []; coinObjs = []; particles = [];
  lastObs = 0; lastCoin = 0;
  resetP();
  overlay.style.display = 'none';
  finalEl.style.display = 'none';
  requestAnimationFrame(loop);
}

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++)
    particles.push({x, y, vx:(Math.random()-.5)*6, vy:-Math.random()*5-1, life:1, color});
}

function drawBg() {
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, groundY);
  const sx = (bgX * 0.05) % W;
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  stars.forEach(s => {
    const rx = ((s.x - sx) % (W+10) + W+10) % (W+10);
    ctx.beginPath(); ctx.arc(rx, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.fillStyle = 'rgba(255,252,220,.85)';
  ctx.beginPath(); ctx.arc(W-90, 55, 26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a1628';
  ctx.beginPath(); ctx.arc(W-78, 47, 23, 0, Math.PI*2); ctx.fill();
}

function drawBuildings() {
  buildings.forEach(b => {
    b.x -= spd * 0.15;
    if (b.x + b.w < 0) {
      b.x = W + 20;
      b.w = 45 + Math.random()*65;
      b.h = 60 + Math.random()*160;
      b.shade = Math.floor(Math.random()*4);
    }
    ctx.fillStyle = bgShades[b.shade];
    ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
    for (let wy = groundY - b.h + 10; wy < groundY - 14; wy += 20) {
      for (let wx = b.x + 6; wx < b.x + b.w - 6; wx += 14) {
        const lit = (Math.floor(wx/14) + Math.floor(wy/20)) % 3 !== 0;
        ctx.fillStyle = lit ? 'rgba(255,220,100,.55)' : 'rgba(40,60,100,.4)';
        ctx.fillRect(wx, wy, 6, 9);
      }
    }
  });
}

function drawGround() {
  ctx.fillStyle = '#0f2040';
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.fillStyle = '#1e3a62';
  ctx.fillRect(0, groundY, W, 5);
  ctx.fillStyle = 'rgba(255,210,0,0.7)';
  const d = (bgX * 0.8) % 90;
  for (let x = -d; x < W; x += 90)
    ctx.fillRect(x, groundY + 2, 48, 3);
}

function drawPlayer() {
  if (P.inv > 0 && Math.floor(P.inv/4)%2 === 1) return;
  const img = imgs[P.fi];
  if (img.complete) ctx.drawImage(img, P.x, P.y, CW, CH);
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  ctx.beginPath();
  ctx.ellipse(P.x + CW/2, groundY + 5, CW*0.28, 5, 0, 0, Math.PI*2);
  ctx.fill();
}

function obsBarrier(o) {
  ctx.fillStyle = '#c62828';
  ctx.beginPath(); ctx.roundRect(o.x, o.y, o.w, o.h, 3); ctx.fill();
  ctx.fillStyle = '#ff5252'; ctx.fillRect(o.x+2, o.y+2, o.w-4, 5);
  ctx.fillStyle = '#fff';
  for (let i=0;i<3;i++) ctx.fillRect(o.x+3+i*7, o.y+o.h/2-3, 5, 6);
  ctx.font='14px serif'; ctx.textAlign='center';
  ctx.fillText('🚧', o.x+o.w/2, o.y+o.h-4);
}
function obsCone(o) {
  ctx.fillStyle = '#e65100';
  ctx.beginPath();
  ctx.moveTo(o.x+o.w/2, o.y);
  ctx.lineTo(o.x+o.w, o.y+o.h);
  ctx.lineTo(o.x, o.y+o.h);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillRect(o.x+4, o.y+o.h*0.45, o.w-8, 6);
}
function obsCar(o) {
  ctx.fillStyle = '#1565c0';
  ctx.beginPath(); ctx.roundRect(o.x, o.y+12, o.w, o.h-12, 5); ctx.fill();
  ctx.fillStyle = '#1976d2';
  ctx.beginPath(); ctx.roundRect(o.x+6, o.y, o.w-14, o.h*0.6, 4); ctx.fill();
  ctx.fillStyle = 'rgba(180,230,255,.7)'; ctx.fillRect(o.x+8, o.y+3, o.w-22, o.h*0.35);
  ctx.fillStyle = '#fdd835';
  ctx.fillRect(o.x, o.y+o.h-10, 10, 8); ctx.fillRect(o.x+o.w-10, o.y+o.h-10, 10, 8);
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(o.x+10, o.y+o.h+1, 7, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(o.x+o.w-10, o.y+o.h+1, 7, 0, Math.PI*2); ctx.fill();
}
function obsPost(o) {
  ctx.fillStyle = '#37474f'; ctx.fillRect(o.x+o.w/2-4, o.y, 8, o.h);
  ctx.fillStyle = '#f44336';
  ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+8, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
  ctx.fillText('!', o.x+o.w/2, o.y+13);
}

const obsTypes = [
  {w:26, h:44, draw:obsBarrier},
  {w:30, h:50, draw:obsCone},
  {w:60, h:28, draw:obsCar},
  {w:22, h:58, draw:obsPost},
];

function spawnObs() {
  const t = obsTypes[Math.floor(Math.random()*obsTypes.length)];
  obstacles.push({x:W+40, y:groundY-t.h, w:t.w, h:t.h, draw:t.draw});
}
function spawnCoin() {
  const yOff = 45 + Math.random()*95;
  coinObjs.push({x:W+30, y:groundY-yOff, ph:Math.random()*Math.PI*2, got:false});
}

function overlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function loop() {
  if (state !== 'run') return;
  gf++;
  bgX += spd;
  score += spd * 0.048;
  spd = Math.min(13, 5 + score * 0.0035);

  P.ft += 16;
  if (P.ft >= FDUR) { P.ft = 0; P.fi = (P.fi+1) % imgs.length; }

  P.vy += 0.78; P.y += P.vy;
  if (P.y + FOOT_H >= groundY) { P.y = GROUND_Y_POS(); P.vy = 0; P.jumps = 2; }
  if (P.inv > 0) P.inv--;

  const obsInterval = Math.max(50, 105 - Math.floor(score/60));
  if (gf - lastObs > obsInterval) { spawnObs(); lastObs = gf; }
  if (gf - lastCoin > 80) { spawnCoin(); lastCoin = gf; }

  ctx.clearRect(0, 0, W, H);
  drawBg();
  drawBuildings();
  drawGround();

  const hx = P.x + LEFT_PAD + (CW-LEFT_PAD-RIGHT_PAD)*0.15;
  const hy = P.y + TOP_PAD + (CH-TOP_PAD-BOT_PAD)*0.05;
  const hw = (CW-LEFT_PAD-RIGHT_PAD)*0.7;
  const hh = (CH-TOP_PAD-BOT_PAD)*0.88;

  obstacles = obstacles.filter(o => o.x > -100);
  for (const o of obstacles) {
    o.x -= spd; o.draw(o);
    if (P.inv === 0 && overlap(hx, hy, hw, hh, o.x, o.y, o.w, o.h)) { die(); return; }
  }

  coinObjs = coinObjs.filter(c => c.x > -30);
  for (const c of coinObjs) {
    c.x -= spd;
    if (!c.got) {
      const bob = Math.sin(gf*0.1 + c.ph)*5;
      ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#ffd700';
      ctx.strokeStyle = '#f57f17'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(c.x, c.y+bob, 11, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#bf360c';
      ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('$', c.x, c.y+bob+4);
      if (overlap(hx, hy, hw, hh, c.x-11, c.y+bob-11, 22, 22)) {
        c.got = true; coins++; score += 25;
        burst(c.x, c.y+bob, '#ffd700', 9);
        playCoinSound(); // 🔊 play sound on collect
      }
    }
  }

  particles = particles.filter(p => p.life > 0.02);
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4*p.life, 0, Math.PI*2); ctx.fill();
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= 0.045;
  }
  ctx.globalAlpha = 1;

  drawPlayer();
  scoreEl.textContent = Math.floor(score);
  coinEl.textContent = '🪙 ' + coins;
  bestEl.textContent = 'BEST: ' + Math.floor(best);

  requestAnimationFrame(loop);
}

function die() {
  state = 'dead';
  if (score > best) best = score;
  burst(P.x+CW/2, P.y+FOOT_H*0.6, '#ff5252', 18);
  playDeathSound();
  setTimeout(() => {
    overlay.style.display = 'flex';
    finalEl.style.display = 'block';
    finalEl.textContent = 'Score: ' + Math.floor(score) + '   🪙 ' + coins;
    btn.textContent = '↩ PLAY AGAIN';
    bestEl.textContent = 'BEST: ' + Math.floor(best);
  }, 600);
}

function idleAnim() {
  if (state === 'run') return;
  ctx.clearRect(0, 0, W, H);
  drawBg(); drawBuildings(); drawGround();
  P.ft += 16;
  if (P.ft >= FDUR) { P.ft = 0; P.fi = (P.fi+1) % imgs.length; }
  P.y = GROUND_Y_POS() + Math.sin(Date.now()*.002)*2;
  drawPlayer();
  requestAnimationFrame(idleAnim);
}
idleAnim();
</script>
